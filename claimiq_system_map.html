<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimIQ · Interactive System Map</title>
<style>
:root{
  color-scheme: dark;
  --bg:#06060e; --panel:#0d0b1a; --panel2:#120e24; --line:#251d42;
  --txt:#e8e4f4; --dim:#9f98b8; --faint:#6a6288;
  --green:#22c55e; --blue:#3b82f6; --amber:#f59e0b; --teal:#14b8a6; --pink:#ec4899; --purple:#a142f4; --violet:#c084fc;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:Inter,"Segoe UI",system-ui,Arial,sans-serif;overflow:hidden}
#bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
   radial-gradient(1000px 600px at 80% -10%, rgba(161,66,244,.13), transparent 60%),
   radial-gradient(900px 700px at -10% 110%, rgba(236,72,153,.07), transparent 60%),
   radial-gradient(700px 500px at 50% 50%, rgba(192,132,252,.05), transparent 60%);}
#bgfx::after{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(192,132,252,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(192,132,252,.05) 1px,transparent 1px);
  background-size:44px 44px;mask-image:radial-gradient(ellipse at 50% 40%,#000 30%,transparent 75%);
  animation:gridDrift 24s linear infinite}
@keyframes gridDrift{to{background-position:44px 44px}}

#app{position:relative;z-index:1;display:flex;height:100vh}

/* ============ SIDEBAR ============ */
#sidebar{width:264px;min-width:264px;height:100%;display:flex;flex-direction:column;
  background:rgba(13,11,26,.88);backdrop-filter:blur(14px);border-right:1px solid var(--line)}
#brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
#brand h1{font-size:17px;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
#brand h1 .logomark{width:26px;height:26px;flex-shrink:0;filter:drop-shadow(0 0 10px rgba(161,66,244,.7));animation:brandPulse 2.6s ease-in-out infinite}
@keyframes brandPulse{50%{filter:drop-shadow(0 0 18px rgba(192,132,252,.95))}}
#brand p{font-size:10.5px;color:var(--faint);margin-top:4px;letter-spacing:.4px}
#nav{flex:1;overflow-y:auto;padding:10px 10px 6px}
#nav::-webkit-scrollbar{width:5px}#nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.navhead{font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:1.4px;padding:12px 10px 6px}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;
  font-size:12.5px;color:var(--dim);border:1px solid transparent;transition:all .18s;margin-bottom:2px;position:relative}
.navitem:hover{background:rgba(161,66,244,.09);color:var(--txt);transform:translateX(3px)}
.navitem.active{background:rgba(161,66,244,.14);border-color:rgba(161,66,244,.38);color:#ede9fe}
.navitem.active::before{content:"";position:absolute;left:-10px;top:20%;height:60%;width:3px;border-radius:2px;background:var(--purple);box-shadow:0 0 8px var(--purple)}
.navitem .ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:800;flex-shrink:0;border:1px solid}
.navitem.simhot .ic{animation:icPulse 1s ease-in-out infinite}
@keyframes icPulse{50%{transform:scale(1.18);filter:brightness(1.6)}}
#legend{padding:12px 14px;border-top:1px solid var(--line)}
#legend h3{font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:1.4px;margin-bottom:8px}
.lrow{display:flex;align-items:center;gap:9px;margin-bottom:6px;font-size:10.5px;color:var(--dim)}
.lrow svg{flex-shrink:0}
#simbtn{margin:12px 14px 16px;padding:12px;border:none;border-radius:11px;cursor:pointer;
  font-size:13px;font-weight:800;letter-spacing:.3px;color:#fff;
  background:linear-gradient(135deg,#a142f4,#7c3aed);
  box-shadow:0 4px 20px rgba(161,66,244,.35), inset 0 1px 0 rgba(255,255,255,.25);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
#simbtn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(161,66,244,.5)}
#simbtn.running{background:linear-gradient(135deg,#f87171,#ec4899);color:#1c0410;box-shadow:0 4px 20px rgba(236,72,153,.4)}

/* ============ STAGE ============ */
#stage{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);
  background:rgba(13,11,26,.7);backdrop-filter:blur(10px)}
#returnhome{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px;
  font-size:11.5px;font-weight:800;color:#ede9fe;text-decoration:none;
  background:rgba(161,66,244,.12);border:1px solid rgba(161,66,244,.36);transition:all .18s;white-space:nowrap}
#returnhome:hover{background:rgba(161,66,244,.24);transform:translateX(-2px)}
#backbtn{display:none;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:11.5px;font-weight:700;color:#c084fc;background:rgba(161,66,244,.12);border:1px solid rgba(161,66,244,.35);transition:all .18s}
#backbtn:hover{background:rgba(161,66,244,.25);transform:translateX(-2px)}
#backbtn.show{display:flex}
#crumb{font-size:11px;color:var(--faint);letter-spacing:.3px}
#crumb b{color:var(--txt);font-weight:700}
#viewtitle{font-size:15px;font-weight:800;margin-left:auto;background:linear-gradient(90deg,#e8e4f4,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent}
#viewport{flex:1;overflow:auto;position:relative;transition:transform .38s cubic-bezier(.5,0,.75,0),opacity .38s}
#viewport::-webkit-scrollbar{width:8px;height:8px}#viewport::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
#viewport.zoomOut{transform:scale(1.9);opacity:0}
#viewport.zoomIn{animation:zin .55s cubic-bezier(.16,1,.3,1)}
@keyframes zin{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
#canvasHolder{padding:18px 22px 30px;min-height:100%}
#canvas{width:100%;height:auto;display:block;max-width:1680px;margin:0 auto}

/* SVG element styling */
.band rect.bandbox{transition:filter .3s}
.band{animation:bandIn .7s cubic-bezier(.16,1,.3,1) both}
@keyframes bandIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
.node{cursor:default}
.node .nbox{transition:stroke .2s, filter .2s}
.node:hover .nbox{stroke:#c084fc;filter:url(#softglow)}
.node.linked{cursor:pointer}
.node.linked .nbox{stroke-dasharray:none}
.node.linked:hover .nbox{stroke:#fff;filter:url(#softglow)}
.node.linked .zoomhint{opacity:0;transition:opacity .2s}
.node.linked:hover .zoomhint{opacity:1}
.node.linked .linkring{animation:linkBreath 3s ease-in-out infinite}
@keyframes linkBreath{50%{opacity:.75}}
.node.sim-on .nbox{stroke-width:2.4;filter:url(#glow)}
.node.sim-on .simring{animation:simRing 1.1s ease-out infinite}
@keyframes simRing{0%{opacity:.9;transform:scale(1)}100%{opacity:0;transform:scale(1.13)}}
.simring{transform-box:fill-box;transform-origin:center;opacity:0}

/* edge base animations */
.e-green{}
.e-blue{stroke-dasharray:7 7;animation:dashFlow 1.1s linear infinite}
.e-amber{stroke-dasharray:9 8;animation:dashFlow 3.2s linear infinite, ambPulse 3.2s ease-in-out infinite}
.e-teal{stroke-dasharray:6 7;animation:dashFlow 1.5s linear infinite}
.e-pink{stroke-dasharray:5 6;animation:dashFlow 2s linear infinite, pinkFlash 2.4s ease-in-out infinite}
@keyframes dashFlow{to{stroke-dashoffset:-30}}
@keyframes ambPulse{50%{opacity:.45}}
@keyframes pinkFlash{0%,78%,100%{opacity:.85}86%{opacity:.25}92%{opacity:1}}
.elabel{font-size:9.5px;font-weight:700;letter-spacing:.2px}

/* ============ SIM HUD — LIVE CLAIM LOG (docked at bottom, never overlaps diagram) ============ */
#hud{flex-shrink:0;display:flex;align-items:stretch;overflow:hidden;
  background:rgba(13,11,26,.96);backdrop-filter:blur(16px);border-top:1px solid rgba(161,66,244,.4);
  box-shadow:0 -10px 34px rgba(0,0,0,.5);max-height:0;transition:max-height .45s cubic-bezier(.16,1,.3,1)}
#hud.show{max-height:176px}
#hud .hudtop{width:320px;min-width:320px;padding:12px 16px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
#hudtag{font-size:9px;font-weight:800;letter-spacing:1.6px;color:var(--faint)}
#hudphase{font-size:12.5px;font-weight:800;color:#c084fc;display:flex;align-items:center;gap:8px}
#hudphase .live{width:8px;height:8px;border-radius:50%;background:#f87171;animation:liveBlink 1s infinite;flex-shrink:0}
@keyframes liveBlink{50%{opacity:.25}}
#huddesc{font-size:10.5px;color:var(--dim);line-height:1.45;flex:1}
#hudbar{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
#hudfill{height:100%;width:0%;background:linear-gradient(90deg,var(--purple),var(--violet),var(--teal));transition:width .5s;box-shadow:0 0 10px rgba(161,66,244,.8)}
#hudlog{flex:1;overflow-y:auto;padding:10px 16px;max-height:176px}
#hudlog::-webkit-scrollbar{width:4px}#hudlog::-webkit-scrollbar-thumb{background:var(--line)}
.logline{display:flex;gap:8px;align-items:flex-start;font-size:10.5px;color:var(--dim);padding:3.5px 0;
  animation:logIn .3s both}
@keyframes logIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.logline .ldot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0;box-shadow:0 0 8px currentColor}
.logline .lt{color:#cbd5e1}
.logline .lts{margin-left:auto;color:var(--faint);font-size:9px;flex-shrink:0;padding-top:1px}

/* toast */
#toast{position:absolute;bottom:22px;left:50%;transform:translate(-50%,80px);z-index:6;
  padding:10px 22px;border-radius:99px;font-size:12.5px;font-weight:700;
  background:rgba(13,11,26,.95);border:1px solid rgba(192,132,252,.5);color:#c084fc;
  box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .45s cubic-bezier(.16,1,.3,1);pointer-events:none}
#toast.show{transform:translate(-50%,0)}

/* tooltip */
#tip{position:fixed;z-index:9;pointer-events:none;max-width:320px;padding:11px 13px;border-radius:11px;
  background:rgba(18,14,36,.98);border:1px solid rgba(161,66,244,.45);box-shadow:0 10px 34px rgba(0,0,0,.65);
  font-size:11px;color:var(--dim);opacity:0;transition:opacity .12s;line-height:1.55}
#tip b{color:var(--txt);font-size:12px;display:block;margin-bottom:3px}
#tip .tdet{display:block;color:#cfc8e6;margin-bottom:5px}
#tip .tchips{display:flex;flex-wrap:wrap;gap:4px}
#tip .tchips span{padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.2px;
  background:rgba(161,66,244,.12);border:1px solid rgba(161,66,244,.3);color:#c8b8ea}
#tip .go{color:#c084fc;font-weight:700;margin-top:6px;display:block}

@media (max-width:860px){#sidebar{width:210px;min-width:210px}}
</style>
</head>

/* ================= LAYOUT & RENDER ================= */
const W=1560;
function layoutView(v){
  const labelW=200, mx=22, cx0=mx+labelW+18, cw=W-cx0-mx;
  let y=76; const pos={}, bands=[];
  v.rows.forEach((r,ri)=>{
    const lines=r.nodes2?[r.nodes,r.nodes2]:[r.nodes];
    const bh=lines.length===2?232:128;
    lines.forEach((ln,li)=>{
      const gap=24, n=ln.length;
      const nw=Math.min(298,(cw-(n-1)*gap)/n);
      const tw=n*nw+(n-1)*gap, sx=cx0+(cw-tw)/2;
      const ny=y+(lines.length===2?(li===0?18:122):20);
      ln.forEach((nd,i)=>{
        const x=sx+i*(nw+gap);
        pos[nd[0]]={x,y:ny,w:nw,h:88,cx:x+nw/2,cy:ny+44,node:nd,band:ri};
      });
    });
    bands.push({y,h:bh,r,ri}); y+=bh+16;
  });
  return {pos,bands,H:y+8};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function edgeGeom(a,b){
  if(Math.abs(a.cy-b.cy)<12){
    const l=a.cx<b.cx?a:b, r=a.cx<b.cx?b:a;
    const x1=a.cx<b.cx?a.x+a.w:a.x, x2=a.cx<b.cx?b.x-7:b.x+b.w+7;
    return {d:`M ${x1} ${a.cy} L ${x2} ${b.cy}`, mid:[(x1+x2)/2,a.cy-8], end:[x2,b.cy]};
  }
  const down=b.cy>a.cy;
  const sy=down?a.y+a.h:a.y, ty=down?b.y-7:b.y+b.h+7;
  const my=(sy+ty)/2;
  return {d:`M ${a.cx} ${sy} C ${a.cx} ${my}, ${b.cx} ${my}, ${b.cx} ${ty}`,
    mid:[(a.cx+b.cx)/2,my-6], end:[b.cx,ty]};
}

function edgeAnim(id,type,geom){
  const c=TOK[type].c;
  if(type==='green') return `
    <circle r="3.2" fill="${c}" filter="url(#softglow)"><animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#${id}"/></animateMotion></circle>
    <circle r="2.2" fill="#86efac"><animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite"><mpath href="#${id}"/></animateMotion></circle>
    <circle r="2.2" fill="#86efac" opacity=".7"><animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite"><mpath href="#${id}"/></animateMotion></circle>`;
  if(type==='blue') return `
    <circle r="4" fill="${c}" filter="url(#glow)"><animateMotion dur="3.4s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#${id}"/></animateMotion>
    <animate attributeName="r" values="4;2.6;4" dur="3.4s" repeatCount="indefinite"/></circle>`;
  if(type==='amber') return `
    <rect width="7" height="7" rx="1.8" x="-3.5" y="-3.5" fill="${c}" filter="url(#softglow)"><animateMotion dur="5s" repeatCount="indefinite" rotate="auto"><mpath href="#${id}"/></animateMotion>
    <animate attributeName="opacity" values="1;.35;1" dur="1.6s" repeatCount="indefinite"/></rect>`;
  if(type==='teal') return `
    <circle r="2.8" fill="${c}"><animateMotion dur="2.1s" repeatCount="indefinite"><mpath href="#${id}"/></animateMotion></circle>
    <circle cx="${geom.end[0]}" cy="${geom.end[1]}" r="3" fill="none" stroke="${c}" stroke-width="1.6">
      <animate attributeName="r" values="2;13" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".9;0" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="${geom.end[0]}" cy="${geom.end[1]}" r="3" fill="none" stroke="${c}" stroke-width="1.2">
      <animate attributeName="r" values="2;13" dur="1.6s" begin=".8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".7;0" dur="1.6s" begin=".8s" repeatCount="indefinite"/></circle>`;
  if(type==='pink') return `
    <g transform="translate(${geom.mid[0]},${geom.mid[1]+6})">
      <rect x="-5" y="-5" width="10" height="10" rx="2" fill="none" stroke="${c}" stroke-width="1.6" transform="rotate(45)" filter="url(#softglow)">
        <animate attributeName="opacity" values=".9;.15;.9" dur="1.4s" repeatCount="indefinite"/></rect>
      <circle r="1.8" fill="${c}"><animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
    </g>`;
  return '';
}

let edgeSeq=0;
function renderView(vid){
  const v=VIEWS.find(x=>x.id===vid); if(!v)return;
  current=vid;
  const L=layoutView(v);
  let defs=`<defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  for(const k in TOK) defs+=`<marker id="mk_${k}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${TOK[k].c}"/></marker>`;
  defs+='</defs>';

  let bandsSvg='';
  L.bands.forEach(b=>{
    const bc=BANDC[b.r.color];
    bandsSvg+=`<g class="band" style="animation-delay:${b.ri*70}ms">
      <rect class="bandbox" x="22" y="${b.y}" width="${W-44}" height="${b.h}" rx="15" fill="${bc}0d" stroke="${bc}55" stroke-width="1.4"/>
      <rect x="40" y="${b.y+b.h/2-21}" width="42" height="42" rx="11" fill="none" stroke="${bc}" stroke-width="2"/>
      <text x="61" y="${b.y+b.h/2+7}" fill="${bc}" font-size="21" font-weight="800" text-anchor="middle">${b.r.n}</text>
      <text x="96" y="${b.y+b.h/2-(b.r.desc?8:-1)}" fill="${bc}" font-size="14.5" font-weight="800">${esc(b.r.label)}</text>
      ${b.r.desc?`<text x="96" y="${b.y+b.h/2+10}" fill="#6a6288" font-size="9.5">${esc(b.r.desc)}</text>`:''}
    </g>`;
  });

  let edgesSvg='', animSvg='';
  (v.edges||[]).forEach(e=>{
    const a=L.pos[e[0]], b=L.pos[e[1]]; if(!a||!b)return;
    const t=e[2], g=edgeGeom(a,b), id='ep'+(++edgeSeq);
    edgesSvg+=`<path id="${id}" d="${g.d}" fill="none" stroke="${TOK[t].c}" stroke-width="1.9" opacity=".85" class="e-${t}" marker-end="url(#mk_${t})"/>`;
    if(e[3]) edgesSvg+=`<text class="elabel" x="${g.mid[0]}" y="${g.mid[1]}" fill="${TOK[t].c}" text-anchor="middle" opacity=".95">${esc(e[3])}</text>`;
    animSvg+=edgeAnim(id,t,g);
  });

  let nodesSvg='';
  for(const k in L.pos){
    const p=L.pos[k], nd=p.node, band=v.rows[p.band], bc=BANDC[band.color];
    const link=nd[4], subs=nd[3]||[];
    let sub=''; subs.forEach((s,i)=>{sub+=`<text x="${p.x+52}" y="${p.y+46+i*13.5}" fill="#9f98b8" font-size="10">${esc(s)}</text>`});
    nodesSvg+=`<g class="node${link?' linked':''}" id="nd_${k}" data-link="${link||''}" data-title="${esc(nd[2])}" data-sub="${esc(subs.join(' · '))}">
      ${link?`<rect class="linkring" x="${p.x-4}" y="${p.y-4}" width="${p.w+8}" height="${p.h+8}" rx="15" fill="none" stroke="${bc}" stroke-width="1.2" opacity=".35" stroke-dasharray="4 5"/>`:''}
      <rect class="simring" x="${p.x-5}" y="${p.y-5}" width="${p.w+10}" height="${p.h+10}" rx="16" fill="none" stroke="#fff" stroke-width="2"/>
      <rect class="nbox" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="12" fill="#120e24" stroke="#3a2d63" stroke-width="1.3"/>
      <rect x="${p.x+12}" y="${p.y+12}" width="30" height="30" rx="8" fill="${bc}18" stroke="${bc}" stroke-width="1.4"/>
      <text x="${p.x+27}" y="${p.y+31}" fill="${bc}" font-size="${nd[1].length>2?9:11}" font-weight="800" text-anchor="middle">${esc(nd[1])}</text>
      <text x="${p.x+52}" y="${p.y+29}" fill="#e8eef8" font-size="12.5" font-weight="700">${esc(nd[2])}</text>
      ${sub}
      ${link?`<text class="zoomhint" x="${p.x+p.w-16}" y="${p.y+20}" fill="${bc}" font-size="12" text-anchor="middle">⤢</text>`:''}
    </g>`;
  }

  const svg=document.getElementById('canvas');
  svg.setAttribute('viewBox',`0 0 ${W} ${L.H}`);
  svg.innerHTML=defs
    +`<text x="${W/2}" y="42" fill="#eef3fb" font-size="26" font-weight="800" text-anchor="middle" style="letter-spacing:.4px">${esc(v.title)}</text>`
    +bandsSvg+edgesSvg+nodesSvg+`<g pointer-events="none">${animSvg}</g>`;

  document.getElementById('viewtitle').textContent=v.nav;
  document.getElementById('crumb').innerHTML=vid==='prototype'
    ?'SYSTEM MAP · <b>Global Pipeline</b>'
    :`SYSTEM MAP · Global Pipeline · <b>${esc(v.nav)}</b>`;
  document.getElementById('backbtn').classList.toggle('show',vid!=='prototype');
  document.querySelectorAll('.navitem').forEach(el=>el.classList.toggle('active',el.dataset.view===vid));

  svg.querySelectorAll('.node').forEach(g=>{
    g.addEventListener('mousemove',ev=>{
      const tip=document.getElementById('tip');
      const det=DETAILS[g.id.slice(3)];
      const chips=g.dataset.sub?`<div class="tchips">${g.dataset.sub.split(' · ').filter(Boolean).map(s=>`<span>${s}</span>`).join('')}</div>`:'';
      tip.innerHTML=`<b>${g.dataset.title}</b>`
        +(det?`<span class="tdet">${det}</span>`:'')
        +chips
        +(g.dataset.link?'<span class="go">⤢ Click to zoom into sub-system</span>':'');
      tip.style.opacity=1;
      tip.style.left=Math.min(ev.clientX+16,innerWidth-340)+'px';
      tip.style.top=Math.min(ev.clientY+14,innerHeight-tip.offsetHeight-18)+'px';
    });
    g.addEventListener('mouseleave',()=>document.getElementById('tip').style.opacity=0);
    if(g.dataset.link) g.addEventListener('click',()=>{stopSim();navigate(g.dataset.link,g)});
  });
}

/* ================= NAVIGATION ================= */
let current=null, navLock=false;
function navigate(vid,originEl){
  if(current===vid||navLock)return; navLock=true;
  const vp=document.getElementById('viewport');
  if(originEl){
    const bb=originEl.getBoundingClientRect(), vb=vp.getBoundingClientRect();
    vp.style.transformOrigin=`${((bb.left+bb.right)/2-vb.left)/vb.width*100}% ${((bb.top+bb.bottom)/2-vb.top)/vb.height*100}%`;
  } else vp.style.transformOrigin='50% 38%';
  vp.classList.add('zoomOut');
  setTimeout(()=>{
    renderView(vid); vp.scrollTop=0;
    vp.classList.remove('zoomOut'); vp.classList.add('zoomIn');
    setTimeout(()=>{vp.classList.remove('zoomIn');navLock=false},560);
  },390);
}

let simRun=null;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function logLine(color,txt){
  const log=document.getElementById('hudlog');
  const d=document.createElement('div'); d.className='logline';
  d.innerHTML=`<span class="ldot" style="background:${color};color:${color}"></span><span class="lt">${txt}</span><span class="lts">${new Date().toLocaleTimeString([],{hour12:false})}</span>`;
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}
function toast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.borderColor=color+'88'; t.style.color=color;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);
}
function clearSimMarks(){document.querySelectorAll('.node.sim-on').forEach(n=>{n.classList.remove('sim-on');const r=n.querySelector('.simring');if(r)r.style.stroke='#fff';const b=n.querySelector('.nbox');if(b)b.style.stroke=''})}
function stopSim(){
  if(!simRun)return;
  simRun.cancel=true; simRun=null;
  clearSimMarks();
  document.getElementById('hud').classList.remove('show');
  document.getElementById('simbtn').classList.remove('running');
  document.getElementById('simbtn').innerHTML='▶&nbsp; Simulate Live Claim';
  document.querySelectorAll('.navitem').forEach(n=>n.classList.remove('simhot'));
}
async function runSim(){
  if(simRun){stopSim();return}
  const run={cancel:false}; simRun=run;
  const btn=document.getElementById('simbtn');
  btn.classList.add('running'); btn.innerHTML='■&nbsp; Stop Simulation';
  document.getElementById('hudlog').innerHTML='';
  document.getElementById('hud').classList.add('show');
  document.getElementById('hudfill').style.width='0%';
  logLine('#22c55e','▶ Live claim CLM-2093 injected into pipeline…');
  for(const ph of SIM){
    if(run.cancel)return;
    document.getElementById('hudphasetxt').textContent=ph.phase;
    document.getElementById('huddesc').textContent=ph.desc;
    document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('simhot',n.dataset.view===ph.view));
    if(current!==ph.view){navigate(ph.view);await sleep(1050)}
    if(run.cancel)return;
    for(const [nid,tok,msg] of ph.steps){
      if(run.cancel)return;
      const g=document.getElementById('nd_'+nid);
      if(g){
        g.classList.add('sim-on');
        const c=TOK[tok].c;
        g.querySelector('.simring').style.stroke=c;
        g.querySelector('.nbox').style.stroke=c;
        g.scrollIntoView({block:'nearest',behavior:'smooth'});
      }
      logLine(TOK[tok].c,msg);
      await sleep(820);
    }
    document.getElementById('hudfill').style.width=ph.pct+'%';
    await sleep(650);
    clearSimMarks();
  }
  if(run.cancel)return;
  logLine('#5eead4','✓ Pipeline complete — adjuster brief ready. Humans decide.');
  toast('✓ Claim CLM-2093 processed end-to-end — awaiting human approval','#5eead4');
  document.querySelectorAll('.navitem').forEach(n=>n.classList.remove('simhot'));
  document.getElementById('simbtn').classList.remove('running');
  document.getElementById('simbtn').innerHTML='▶&nbsp; Simulate Live Claim';
  simRun=null;
  setTimeout(()=>{if(!simRun)document.getElementById('hud').classList.remove('show')},5200);
}
document.getElementById('simbtn').addEventListener('click',runSim);

/* boot */
renderView('prototype');
setTimeout(()=>toast('Tip: hover any box for details · click glowing nodes to zoom into their sub-system','#c084fc'),1200);
</script>
